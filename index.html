<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Персональный сайт-портфолио учителя биологии">
  <title>Портфолио учителя биологии</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Шапка -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <div class="header-name" id="header-name"></div>
      <nav class="main-nav" id="main-nav" aria-label="Навигация">
        <ul class="nav-list" id="nav-list"></ul>
      </nav>
      <button class="burger" id="burger" aria-label="Открыть меню" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Основное содержимое -->
  <main id="main">
    <section id="hero"         class="section section-hero"></section>
    <section id="about"        class="section section-alt"></section>
    <section id="results"      class="section"></section>
    <section id="publications" class="section section-alt"></section>
    <section id="exams"        class="section"></section>
    <section id="research"     class="section section-alt"></section>
    <section id="methods"      class="section"></section>
    <section id="programs"     class="section section-alt"></section>
    <section id="gallery"      class="section"></section>
    <section id="contacts"     class="section section-alt"></section>
  </main>

  <!-- Подвал -->
  <footer class="site-footer">
    <div class="container">
      <p id="footer-name"></p>
    </div>
  </footer>

  <!-- Кнопка «Наверх» -->
  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- Модальное окно галереи -->
  <div class="modal" id="gallery-modal" role="dialog" aria-modal="true" aria-label="Просмотр фото">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <img src="" alt="" id="modal-img">
      <p class="modal-caption" id="modal-caption"></p>
    </div>
  </div>

  <noscript>
    <div style="padding:2rem;text-align:center;font-family:sans-serif;">
      Для работы сайта необходим JavaScript. Пожалуйста, включите его в настройках браузера.
    </div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
